<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Open YouTube Channels</title>
<script>
function openAll() {
  const links = [
    'https://www.youtube.com/@d.yelisevych/videos',
    'https://www.youtube.com/@Taras_Lawyer/videos',
    'https://www.youtube.com/@DubinizmTV',
    'https://tinyurl.com/4sytecma',
    'https://www.youtube.com/@LISOVSKIY_NEWS/videos',
    'https://tinyurl.com/57en7fvu',
    'https://www.youtube.com/@shelestSHUM/videos'
  ];
  
  links.forEach(link => {
    window.open(link, '_blank');
  });
}
</script>
</head>

<body>
  <h1>Все каналы готовы к открытию</h1>
  <button onclick="openAll()" style="padding: 15px 30px; font-size: 20px; cursor: pointer;">
    Открыть все каналы
  </button>
</body>
</html>
